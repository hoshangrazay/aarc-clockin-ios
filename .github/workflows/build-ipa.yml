name: Build unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen (frozen major)
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Xcode version
        id: xcv
        run: |
          xcodebuild -version || true
          ls -la /Applications | grep Xcode || true
          echo "available=$(ls /Applications | grep -c Xcode)" >> "$GITHUB_OUTPUT"

      - name: Build (unsigned)
        run: |
          set -e
          xcodebuild \
            -project AARCClockIn.xcodeproj \
            -scheme AARCClockIn \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build \
            | tee build.log

      - name: Verify app built
        run: |
          find build/DerivedData -name "AARCClockIn.app" -type d -print
          test -d build/DerivedData/Build/Products/Release-iphoneos/AARCClockIn.app || {
            echo "::error::AARCClockIn.app not found - firstая build failed";
            tail -n 80 build.log;
            exit 1;
          }

      - name: Pack unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/DerivedData/Build/Products/Release-iphoneos/AARCClockIn.app Payload/
          # same name as app folder, preserves CFBundleName visibility in 3uTools
          zip -qr9 AARCClockIn-unsigned.ipa Payload
          ls -lh AARCClockIn-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AARCClockIn-unsigned-ipa
          path: AARCClockIn-unsigned.ipa
          if-no-files-found: error
          retention-days: 90

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 30
          if-no-files-found: ignore
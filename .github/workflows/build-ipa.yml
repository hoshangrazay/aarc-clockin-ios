name: Build unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show Xcode version
        run: xcodebuild -version || true

      - name: Build (unsigned)
        run: |
          set -e
          xcodebuild \
            -project AARCClockIn.xcodeproj \
            -scheme AARCClockIn \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee build.log

      - name: Verify app built
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/AARCClockIn.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::AARCClockIn.app not found - build failed"
            tail -n 80 build.log
            exit 1
          fi
          echo "Built app at: $APP_PATH"

      - name: Pack unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/DerivedData/Build/Products/Release-iphoneos/AARCClockIn.app Payload/
          zip -qr9 AARCClockIn-unsigned.ipa Payload
          ls -lh AARCClockIn-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AARCClockIn-unsigned-ipa
          path: AARCClockIn-unsigned.ipa
          if-no-files-found: error
          retention-days: 90

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 30
          if-no-files-found: ignore
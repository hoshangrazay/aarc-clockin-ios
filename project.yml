name: AARCClockIn
options:
  bundleIdPrefix: com.aarc
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_NAME: "AARCClockIn"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  AARCClockIn:
    type: application
    platform: iOS
    sources:
      - path: AARCClockIn
        excludes:
          - Resources/Info.plist
          - Resources/Assets.xcassets/Contents.json
          - Resources/Assets.xcassets/AppIcon.appiconset/Contents.json
    resources:
      - path: AARCClockIn/Resources/Assets.xcassets
    info:
      path: AARCClockIn/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleDisplayName: "AARC Clock in"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - location
        NSLocationWhenInUseUsageDescription: "AARC Clock in needs your location to verify you are at the charity before clocking in."
        NSLocationAlwaysAndWhenInUseUsageDescription: "AARC Clock in needs your location even in the background to send GPS updates while you are clocked in at the charity."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aarc.aarcclockin
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO